<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мои Резюме</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <!-- Подключаем Font Awesome для иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Стили для иконок */
        .action-icons {
            position: absolute;
            top: 10px;
            right: 10px;
        }
        .action-icons a {
            margin-left: 10px;
            color: #6c757d; /* Серый цвет иконок */
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .action-icons a:hover {
            color: #007bff; /* Синий цвет при наведении */
        }
        .card {
            position: relative; /* Для позиционирования иконок */
        }
        .editable {
            display: none; /* Скрываем редактируемые поля по умолчанию */
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <h1>Мои Резюме</h1>
    <div th:each="resume : ${resumes}">
        <div class="card mb-3" th:id="'resume-' + ${resume.ID}">
            <!-- Иконки удаления и редактирования -->
            <div class="action-icons">
                <!-- Иконка редактирования -->
                <a href="#" th:onclick="'editResume(event, ' + ${resume.ID} + ')'" title="Редактировать">
                    <i class="fas fa-pencil-alt"></i> <!-- Иконка карандаша -->
                </a>
                <!-- Иконка удаления -->
                <a th:href="@{'/resume/delete/' + ${resume.ID}}" title="Удалить" onclick="return confirm('Вы уверены, что хотите удалить это резюме?');">
                    <i class="fas fa-trash"></i> <!-- Иконка корзины -->
                </a>
            </div><div class="card-body">
            <!-- Статическое отображение резюме -->
            <div class="static-view">
                <h5 class="card-title" th:text="${resume.position}">Позиция</h5>
                <p class="card-text" th:text="${resume.description}">Описание</p>
                <p class="card-text"><strong>Опыт работы:</strong> <span th:text="${resume.workExperience} + ' лет'"></span></p>
                <p class="card-text"><strong>Файл резюме:</strong> <a th:href="@{'/resume/download/' + ${resume.ID}}" th:text="${resume.fileName}"></a></p>
            </div>
            <!-- Редактируемые поля -->
            <div class="editable">
                <input type="text" class="form-control mb-2" th:id="'position-' + ${resume.ID}" th:value="${resume.position}" placeholder="Позиция">
                <textarea class="form-control mb-2" th:id="'description-' + ${resume.ID}" placeholder="Описание" th:text="${resume.description}"></textarea>
                <input type="number" class="form-control mb-2" th:id="'workExperience-' + ${resume.ID}" th:value="${resume.workExperience}" placeholder="Опыт работы (лет)" step="0.1">
                <input type="file" class="form-control mb-2" th:id="'file-' + ${resume.ID}" placeholder="Выберите файл">
                <button class="btn btn-success" th:onclick="'saveResume(event, ' + ${resume.ID} + ')'">Сохранить</button>
            </div>
        </div>

        </div>
    </div>
    <a href="/user/profile" class="btn btn-primary mt-3">Назад</a>
</div>

<script>
    // Функция для переключения в режим редактирования
    function editResume(event, resumeId) {
        event.preventDefault(); // Отменяем стандартное поведение ссылки

        const card = document.getElementById(`resume-${resumeId}`);
        const staticView = card.querySelector('.static-view');
        const editableView = card.querySelector('.editable');

        // Переключаем видимость
        staticView.style.display = 'none';
        editableView.style.display = 'block';
    }

    function saveResume(event, resumeId) {
    event.preventDefault(); // Отменяем стандартное поведение кнопки

    const card = document.getElementById(`resume-${resumeId}`);
    const position = document.getElementById(`position-${resumeId}`).value;
    const description = document.getElementById(`description-${resumeId}`).value;
    const workExperience = document.getElementById(`workExperience-${resumeId}`).value;
    const fileInput = document.getElementById(`file-${resumeId}`);
    const file = fileInput.files[0];

    // Создаем объект FormData
    const formData = new FormData();
    formData.append('id', resumeId);
    formData.append('position', position);
    formData.append('description', description);
    formData.append('workExperience', workExperience);
    if (file) {
        formData.append('file', file);
    }

    // Отправляем данные на сервер
    fetch(`/resume/edit`, {
        method: 'POST',
        body: formData // Отправляем FormData
    })
    .then(response => {
        if (response.ok) {
            const staticView = card.querySelector('.static-view');
            const editableView = card.querySelector('.editable');

            staticView.querySelector('.card-title').textContent = position;
            staticView.querySelector('.card-text:nth-of-type(1)').textContent = description;
            staticView.querySelector('.card-text:nth-of-type(2) span').textContent = workExperience + ' лет';

            // Обновляем имя файла, если файл был загружен
            if (file) {
                staticView.querySelector('.card-text:nth-of-type(3) a').textContent = file.name;
            }

            staticView.style.display = 'block';
            editableView.style.display = 'none';
        } else {
            console.error('Ошибка при сохранении');
        }
    })
    .catch(error => console.error('Ошибка:', error));
}
</script>
</body>
</html>
