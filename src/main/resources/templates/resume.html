<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Создать резюме</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            animation: fadeIn 1s ease-out;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #2c3e50;
            font-weight: bold;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #34495e;
        }

        input[type="text"],
        input[type="number"],
        textarea,
        input[type="file"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus,
        input[type="file"]:focus {
            border-color: #1abc9c;
            box-shadow: 0 0 8px rgba(26, 188, 156, 0.3);
        }

        textarea {
            resize: vertical;
            height: 120px;
        }

        button {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1abc9c, #16a085);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.3s ease;
        }

        button:hover {
            background: linear-gradient(135deg, #16a085, #1abc9c);
            transform: translateY(-2px);
        }

        .btn-cancel {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: background 0.3s ease, transform 0.3s ease;
        }

        .btn-cancel:hover {
            background: linear-gradient(135deg, #c0392b, #e74c3c);
            transform: translateY(-2px);
        }

        /* Анимация для появления контейнера */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Иконки для красоты */
        .icon {
            margin-right: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>
        <i class="fas fa-file-alt icon"></i>
        Создать резюме
    </h1>
    <form th:action="@{/resume/create}" th:object="${resume}" method="post" enctype="multipart/form-data">
        <!-- Поле для должности -->
        <div>
            <label for="position">Ваша должность</label>
            <input type="text" id="position" th:field="*{position}" placeholder="Введите вашу должность" required>
        </div>

        <!-- Поле для описания -->
        <div>
            <label for="description">Описание</label>
            <textarea id="description" th:field="*{description}" placeholder="Опишите ваш опыт и навыки" required></textarea>
        </div>

        <!-- Поле для опыта работы -->
        <div>
            <label for="workExperience">Опыт работы (лет)</label>
            <input type="number" id="workExperience" th:field="*{workExperience}" step="0.1" placeholder="Введите ваш опыт работы" required>
        </div>

        <!-- Поле для загрузки файла -->
        <div>
            <label for="file">Прикрепить файл</label>
            <input type="file" id="file" name="file">
        </div>

        <!-- Кнопка для отправки формы -->
        <button type="submit">
            <i class="fas fa-save icon"></i>
            Создать
        </button>
    </form>

    <!-- Кнопка "Отмена" -->
    <a href="/user/profile" class="btn-cancel mt-3">
        <i class="fas fa-times icon"></i>
        Отмена
    </a>
</div>
</body>
</html>
