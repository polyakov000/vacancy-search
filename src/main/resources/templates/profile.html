<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Profile</title>
</head>
<body>
<h1>Profile</h1>
<p>Username: <span th:text="${user.username}"></span></p>
<p>Email: <span th:text="${user.email}"></span></p>

<!-- Отображение полей для EMPLOYER -->
<div th:if="${user.role == T(com.example.vacancy_search.domain.Roles).EMPLOYER}">
    <p>Organization: <span th:text="${employer.organisation}"></span></p>
    <p>Description: <span th:text="${employer.description}"></span></p>
</div>

<!-- Кнопки в зависимости от роли -->
<div sec:authorize="hasRole('ROLE_CANDIDATE')">
    <a th:href="@{/resume/create}">
        <button>Create Resume</button>
    </a>
</div>

<div sec:authorize="hasRole('ROLE_EMPLOYER')">
    <a th:href="@{/vacancy/create}">
        <button>Create Vacancy</button>
    </a>
</div>
</body>
</html>
