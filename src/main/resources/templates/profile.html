<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Profile</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h1>Мой профиль</h1>
    <div class="row">
        <div class="col-md-8">
            <p>Имя пользователя: <span th:text="${user.username}"></span></p>
            <p>Email: <span th:text="${user.email}"></span></p>

            <!-- Отображение полей для EMPLOYER -->
            <div th:if="${user.role == T(com.example.vacancy_search.domain.Roles).EMPLOYER}">
                <p>Организация: <span th:text="${employer.organisation}"></span></p>
                <p>Описание: <span th:text="${employer.description}"></span></p>
            </div>
        </div>
        <div class="col-md-4 text-right">
            <!-- Кнопка "Мои резюме" для кандидатов -->
            <div sec:authorize="hasRole('ROLE_CANDIDATE')">
                <a th:href="@{/resume/watch}">
                    <button class="btn btn-primary">Мои резюме</button>
                </a>
            </div>
        </div>
    </div>

    <!-- Кнопки в зависимости от роли -->
    <div sec:authorize="hasRole('ROLE_CANDIDATE')">
        <a th:href="@{/resume/create}">
            <button class="btn btn-success mt-3">Добавить резюме</button>
        </a>
    </div>

    <div sec:authorize="hasRole('ROLE_CANDIDATE')">
        <a th:href="@{/vacancy/find}">
            <button class="btn btn-success mt-3">Просмотреть вакансии</button>
        </a>
    </div>

    <div sec:authorize="hasRole('ROLE_EMPLOYER')">
        <a th:href="@{/vacancy/create}">
            <button class="btn btn-success mt-3">Добавить вакансию</button>
        </a>
    </div>
</div>
</body>
</html>
