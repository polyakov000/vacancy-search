<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="/css/signin.css">
    <style>
        /* Общий стиль для страницы */
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: 'Arial', sans-serif;
    background-image: url('fone.jpg'); /* Использование вашей картинки */
    background-size: cover; /* Картинка покрывает весь экран */
    background-position: center;
    background-repeat: no-repeat;
    color: #fff; /* Белый текст для контраста */
}

/* Полупрозрачный слой поверх фона */
.overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5); /* Черный прозрачный слой */
    z-index: -1;
}

.login-form {
    position: relative;
    padding: 30px; /* Увеличен padding для простора */
    background: rgba(255, 255, 255, 0.9); /* Полупрозрачный белый фон */
    border-radius: 12px; /* Увеличен радиус границы */
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3); /* Сильная тень */
    width: 350px; /* Ширина формы увеличена */
    text-align: center;
}

.login-form h2 {
    margin-bottom: 20px;
    color: #333; /* Заголовок более контрастный */
    font-size: 1.8rem; /* Увеличен размер шрифта */
    font-weight: 700; /* Жирный заголовок */
}

.login-form h2 i {
    margin-right: 10px; /* Отступ между иконкой и текстом */
    color: #007bff; /* Цвет иконки "замок" */
}

.login-form input {
    width: 100%;
    padding: 12px; /* Увеличено пространство для ввода */
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
    box-sizing: border-box;
    font-size: 1rem;
    transition: box-shadow 0.3s, border-color 0.3s; /* Добавлена плавная анимация */
}

.login-form input:focus {
    border-color: #007bff; /* Цвет границы при фокусе */
    box-shadow: 0 0 8px rgba(0, 123, 255, 0.5); /* Подсветка при фокусе */
    outline: none;
}

.login-form button {
    width: 100%;
    padding: 12px;
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 6px; /* Увеличен радиус кнопки */
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: background-color 0.3s, box-shadow 0.3s; /* Анимация эффекта наведения */
}

.login-form button:hover {
    background-color: #0056b3;
    box-shadow: 0 4px 12px rgba(0, 123, 255, 0.5); /* Подсветка при наведении */
}

.login-form a {
    display: block;
    margin-top: 15px;
    color: #007bff;
    text-decoration: none;
    font-size: 1rem; /* Увеличен размер текста */
}

.login-form a:hover {
    text-decoration: underline;
    color: #0056b3; /* Цвет ссылки при наведении */
}

    </style>


</head>
<body>
<div class="overlay"></div> <!-- Полупрозрачный фон -->
<div class="login-form">
    <h2><i class="fas fa-lock"></i> Вход</h2> <!-- Добавлена иконка "замок" -->
    <form th:action="@{/signin}" method="post">
        <input type="text" name="username" placeholder="Имя пользователя" required>
        <input type="password" name="password" placeholder="Пароль" required>
        <button type="submit">Войти</button>
    </form>
    <a th:href="@{/signup}">Ещё нет аккаунта? Зарегистрируйтесь</a>
</div>
</body>
</html>
